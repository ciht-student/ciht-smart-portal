<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIHT Smart Portal - College Management System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="custom-logo"></i>
                <p>College Management System</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username / Roll Number</label>
                    <input type="text" id="username" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="role" class="form-control" required>
                        <option value="">Select Role</option>
                        <option value="admin">Admin</option>
                        <option value="teacher">Teacher</option>
                        <option value="student">Student</option>
                    </select>
                </div>
                <button type="submit" class="btn-login">Login</button>
            </form>
            <div class="about-section">
                <p>CIHT Smart Portal - Developed by Jaskaran Singh Aasi</p>
            </div>
        </div>
    </div>

    <!-- Main Dashboard (Hidden initially) -->
    <div id="dashboard" style="display: none;">
        <div class="dashboard-container">
            <!-- Sidebar -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <i class="fas fa-graduation-cap"></i>
                    <h3>CIHT Portal</h3>
                </div>
                <nav class="sidebar-nav">
                    <a href="#" data-page="dashboard" class="active">
                        <i class="fas fa-tachometer-alt"></i>
                        <span>Dashboard</span>
                    </a>
                    <div id="adminMenu" style="display: none;">
                        <a href="#" data-page="branches"><i class="fas fa-code-branch"></i><span>Branches</span></a>
                        <a href="#" data-page="students"><i class="fas fa-user-graduate"></i><span>Students</span></a>
                        <a href="#" data-page="teachers"><i class="fas fa-chalkboard-user"></i><span>Teachers</span></a>
                        <a href="#" data-page="attendance"><i class="fas fa-calendar-check"></i><span>Attendance</span></a>
                        <a href="#" data-page="marks"><i class="fas fa-chart-line"></i><span>Marks</span></a>
                        <a href="#" data-page="notices"><i class="fas fa-bullhorn"></i><span>Notices</span></a>
                        <a href="#" data-page="timetable"><i class="fas fa-table"></i><span>Time Table</span></a>
                        <a href="#" data-page="reports"><i class="fas fa-file-alt"></i><span>Reports</span></a>
                    </div>
                    <div id="teacherMenu" style="display: none;">
                        <a href="#" data-page="students"><i class="fas fa-user-graduate"></i><span>Students</span></a>
                        <a href="#" data-page="attendance"><i class="fas fa-calendar-check"></i><span>Attendance</span></a>
                        <a href="#" data-page="marks"><i class="fas fa-chart-line"></i><span>Marks</span></a>
                        <a href="#" data-page="notices"><i class="fas fa-bullhorn"></i><span>Notices</span></a>
                        <a href="#" data-page="timetable"><i class="fas fa-table"></i><span>Time Table</span></a>
                    </div>
                    <div id="studentMenu" style="display: none;">
                        <a href="#" data-page="profile"><i class="fas fa-user"></i><span>Profile</span></a>
                        <a href="#" data-page="attendance"><i class="fas fa-calendar-check"></i><span>Attendance</span></a>
                        <a href="#" data-page="marks"><i class="fas fa-chart-line"></i><span>Marks</span></a>
                        <a href="#" data-page="notices"><i class="fas fa-bullhorn"></i><span>Notices</span></a>
                        <a href="#" data-page="timetable"><i class="fas fa-table"></i><span>Time Table</span></a>
                    </div>
                    <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
                </nav>
            </div>

            <!-- Main Content -->
            <div class="main-content">
                <div class="top-bar">
                    <div class="user-info">
                        <i class="fas fa-user-circle"></i>
                        <span id="userName">Welcome, User</span>
                    </div>
                </div>
                <div class="content-area" id="contentArea">
                    <!-- Dynamic content will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
